name: ${COMPOSE_PROJECT_NAME:-medorion}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medorion}
      POSTGRES_USER: ${POSTGRES_USER:-medorion_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/data/postgres:/var/lib/postgresql/data
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/logs/postgres:/var/log/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/data/redis:/data
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/logs/redis:/logs
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-medorion_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/data/minio:/data
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/logs/minio:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data

  minio-init:
    image: minio/mc:latest
    profiles: ["init"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-medorion_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET_CASES: ${MINIO_BUCKET_CASES:-medorion-cases}
      MINIO_BUCKET_MODELS: ${MINIO_BUCKET_MODELS:-medorion-models}
      MINIO_BUCKET_MLFLOW: ${MINIO_BUCKET_MLFLOW:-medorion-mlflow}
    entrypoint: >
      /bin/sh -c '
      mc alias set medorion http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
      mc mb --ignore-existing medorion/"$${MINIO_BUCKET_CASES}";
      mc mb --ignore-existing medorion/"$${MINIO_BUCKET_MODELS}";
      mc mb --ignore-existing medorion/"$${MINIO_BUCKET_MLFLOW}";
      '
    networks:
      - data

  backend:
    image: ${BACKEND_IMAGE:-medorion/backend:local}
    build:
      context: ${MEDORION_CODE_ROOT:-/srv/medorion/app}/backend
      dockerfile: Dockerfile
    profiles: ["app"]
    restart: unless-stopped
    environment:
      BACKEND_ENV: ${BACKEND_ENV:-production}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-medorion_app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-medorion}
      REDIS_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-medorion_minio_admin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      MODEL_SERVICE_URL: http://model-service:8100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/logs/backend:/app/logs
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/models:/srv/medorion/models:ro
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/app/model-runners:/srv/medorion/app/model-runners:ro
      - /home/sygxdg/miniconda3/envs/MRI3D:/home/sygxdg/miniconda3/envs/MRI3D:ro
    networks:
      - app
      - data
      - model

  frontend:
    image: ${FRONTEND_IMAGE:-medorion/frontend:local}
    build:
      context: ${MEDORION_CODE_ROOT:-/srv/medorion/app}/frontend
      dockerfile: Dockerfile
    profiles: ["app"]
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    networks:
      - app

  model-service:
    image: ${MODEL_SERVICE_IMAGE:-medorion/model-service:local}
    build:
      context: ${MEDORION_CODE_ROOT:-/srv/medorion/app}/model-service
      dockerfile: Dockerfile
    profiles: ["model"]
    restart: unless-stopped
    environment:
      MODEL_DEVICE: ${MODEL_DEVICE:-cpu}
      MODEL_BATCH_SIZE: ${MODEL_BATCH_SIZE:-1}
      MODEL_MAX_CONCURRENCY: ${MODEL_MAX_CONCURRENCY:-1}
      MODEL_REGISTRY_DIR: /models/registry
      MODEL_RUNTIME_DIR: /models/runtime
      REDIS_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MODEL_SERVICE_PORT:-8100}:8100"
    volumes:
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/models:/models:ro
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/logs/model-service:/app/logs
    networks:
      - model
      - data

  mlflow:
    image: ${MLFLOW_IMAGE:-ghcr.io/mlflow/mlflow:v2.22.0}
    profiles: ["mlflow"]
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-medorion_app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-medorion}
      --artifacts-destination s3://${MINIO_BUCKET_MLFLOW:-medorion-mlflow}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medorion}
      POSTGRES_USER: ${POSTGRES_USER:-medorion_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      MINIO_BUCKET_MLFLOW: ${MINIO_BUCKET_MLFLOW:-medorion-mlflow}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-medorion_minio_admin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MLFLOW_PORT:-5000}:5000"
    volumes:
      - ${MEDORION_DEPLOY_ROOT:-/srv/medorion}/logs/mlflow:/mlflow/logs
    networks:
      - data

networks:
  app:
  data:
  model:
